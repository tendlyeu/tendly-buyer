services:
  tendly-chat:
    build: .
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      - PORT=5002
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
