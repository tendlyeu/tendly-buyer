name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        type: string
        default: 'main'
      environment:
        description: 'Environment type'
        required: true
        type: choice
        options:
          - production
          - staging
          - development
        default: 'staging'

env:
  GCP_PROJECT_ID: scenic-impact-476918-n6
  GCP_REGION: europe-north1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set environment variables
        env:
          DEPLOY_BRANCH: ${{ github.event.inputs.branch }}
          DEPLOY_ENV: ${{ github.event.inputs.environment }}
        run: |
          case "$DEPLOY_ENV" in
            production)
              SERVICE_NAME="tendly-agent-chat"
              CLOUD_SQL_INSTANCE_NAME="tendly-prod"
              DB_NAME="tendly_prod"
              SECRET_ENV="prod"
              MAX_INSTANCES=3
              ;;
            staging)
              SERVICE_NAME="tendly-agent-chat-staging"
              CLOUD_SQL_INSTANCE_NAME="tendly-dev"
              DB_NAME="tendly_dev"
              SECRET_ENV="dev"
              MAX_INSTANCES=2
              ;;
            *)
              SERVICE_NAME="tendly-agent-chat-dev"
              CLOUD_SQL_INSTANCE_NAME="tendly-dev"
              DB_NAME="tendly_dev"
              SECRET_ENV="dev"
              MAX_INSTANCES=2
              ;;
          esac

          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV
          echo "BRANCH_NAME=$DEPLOY_BRANCH" >> $GITHUB_ENV
          echo "CLOUD_SQL_INSTANCE_NAME=$CLOUD_SQL_INSTANCE_NAME" >> $GITHUB_ENV
          echo "DB_NAME=$DB_NAME" >> $GITHUB_ENV
          echo "SECRET_ENV=$SECRET_ENV" >> $GITHUB_ENV
          echo "MAX_INSTANCES=$MAX_INSTANCES" >> $GITHUB_ENV

          echo "Deploying branch: $DEPLOY_BRANCH"
          echo "Service name: $SERVICE_NAME"
          echo "Environment: $DEPLOY_ENV"
          echo "Secret Manager prefix: tendly-$SECRET_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Enable required GCP APIs
        run: |
          gcloud services enable artifactregistry.googleapis.com --quiet
          gcloud services enable run.googleapis.com --quiet
          gcloud services enable cloudbuild.googleapis.com --quiet
          gcloud services enable secretmanager.googleapis.com --quiet

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry repository (if not exists)
        run: |
          gcloud artifacts repositories describe tendly-agent-chat \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || \
          gcloud artifacts repositories create tendly-agent-chat \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --description="Tendly Agent Chat Docker images"

      - name: Build and Push Docker image
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/tendly-agent-chat/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          CLOUD_SQL_INSTANCE="${{ env.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:${{ env.CLOUD_SQL_INSTANCE_NAME }}"
          ENV="${{ env.SECRET_ENV }}"

          echo "Connecting to Cloud SQL: $CLOUD_SQL_INSTANCE"
          echo "Secrets from: tendly-${ENV}-*"

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_URI }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=${{ env.MAX_INSTANCES }} \
            --concurrency=80 \
            --timeout=300 \
            --port=8080 \
            --allow-unauthenticated \
            --add-cloudsql-instances=$CLOUD_SQL_INSTANCE \
            --set-env-vars="USE_GCP_CLOUD_SQL=true,CLOUD_SQL_INSTANCE=$CLOUD_SQL_INSTANCE,DB_NAME=${{ env.DB_NAME }},DB_USER=tendly_admin,ENVIRONMENT=${{ github.event.inputs.environment }}" \
            --set-secrets="DB_PASSWORD=tendly-${ENV}-db-password:latest,GEMINI_API_KEY=tendly-${ENV}-gemini-api-key:latest" \
            --labels="environment=${{ github.event.inputs.environment }}"

      - name: Show deployed URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')

          echo ""
          echo "============================================"
          echo "DEPLOYMENT COMPLETE!"
          echo "============================================"
          echo "Branch:      ${{ env.BRANCH_NAME }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Service:     ${{ env.SERVICE_NAME }}"
          echo "URL:         $SERVICE_URL"
          echo "============================================"
