server {
    listen 80;
    server_name buyer.tendly.eu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buyer.tendly.eu;

    ssl_certificate /etc/letsencrypt/live/buyer.tendly.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buyer.tendly.eu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # File upload limit (for document uploads)
    client_max_body_size 15M;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (critical for AI chat streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # Serve uploaded files directly
    location /uploads/ {
        alias /opt/tendly-buyer/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
